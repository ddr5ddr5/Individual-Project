        <!--Send Us A Message Form Code -->
        <h2>Send Us a Message</h2>
        <form action="mailto:Harrodsmgmt@gmail.com" method="post" enctype="text/plain">
           
            <!--Name field -->
            <label for="name">Name:</label><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <!--Message field -->
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="33" required></textarea><br><br>

        <!-- Load external JavaScript -->
        <script src="scripts.js"></script>

        <script>
  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function () {
      gtag("event", "navigation_click", {
        event_category: "navigation",
        event_label: this.getAttribute("href")
      });
    });
  });

  document.querySelectorAll("button, input[type='submit'], input[type='button']").forEach(button => {
    button.addEventListener("click", function () {
      gtag("event", "button_click", {
        event_category: "engagement",
        event_label: this.value || this.textContent.trim() || this.id || "button"
      });
    });
  });

  document.querySelectorAll("form").forEach(form => {
    form.addEventListener("submit", function () {
      gtag("event", "form_submit", {
        event_category: "engagement",
        event_label: this.id || this.action || "form"
      });
    });
  });

  let startTime = Date.now();

  window.addEventListener("beforeunload", function () {
    let timeSpent = Math.round((Date.now() - startTime) / 1000);

    gtag("event", "time_on_page", {
      event_category: "engagement",
      event_label: document.title,
      value: timeSpent
    });
  });
</script>
